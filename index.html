<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Blokaja</title>
  <link rel="icon" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-512.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <button id="btn-back" class="icon-btn hidden" aria-label="Retour">←</button>
      <h1 id="header-title">Blokaja</h1>
      <button id="btn-dark" class="icon-btn" aria-label="Thème">◐</button>
    </header>

    <!-- Search bar (always visible on home) -->
    <div id="search-wrap" class="hidden">
      <input type="text" id="search-input" placeholder="Chercher en coréen ou français..." autocomplete="off">
      <div id="search-results"></div>
    </div>

    <!-- Home -->
    <section id="screen-home" class="screen active">
      <div id="search-home-wrap">
        <input type="text" id="search-home" placeholder="Rechercher..." autocomplete="off">
      </div>
      <div id="global-progress"></div>
      <h2 class="section-title">Chapitres</h2>
      <div id="chapters-grid" class="grid"></div>
      <h2 class="section-title">Catégories</h2>
      <div id="categories-grid" class="grid"></div>
    </section>

    <!-- List -->
    <section id="screen-list" class="screen">
      <div class="list-head">
        <div>
          <h2 id="list-title"></h2>
          <div class="list-stats"><span id="list-known">0</span> / <span id="list-total">0</span> maîtrisés</div>
        </div>
        <button id="btn-fc" class="btn-primary">Réviser</button>
      </div>
      <div class="progress-bar"><div id="list-bar" class="bar-fill"></div></div>
      <div id="items"></div>
    </section>

    <!-- Flashcard (infinite) -->
    <section id="screen-fc" class="screen">
      <div class="fc-top">
        <span id="fc-cat" class="fc-cat"></span>
        <span id="fc-page" class="fc-page"></span>
      </div>
      <div id="fc-card" class="fc-card">
        <div id="fc-front" class="fc-face"></div>
        <div id="fc-back" class="fc-face hidden"></div>
      </div>
      <div id="fc-actions" class="hidden">
        <button id="fc-nope" class="btn-nope">Pas su</button>
        <button id="fc-ok" class="btn-ok">Su</button>
      </div>
      <button id="fc-reveal" class="btn-reveal">Voir la réponse</button>
    </section>

    <!-- Search results (full screen) -->
    <section id="screen-search" class="screen">
      <div id="search-full-wrap">
        <input type="text" id="search-full" placeholder="Rechercher en coréen ou français..." autocomplete="off">
      </div>
      <div id="search-full-results"></div>
    </section>

    <!-- Tab bar -->
    <nav id="tabs">
      <button class="tab active" data-screen="home">Accueil</button>
      <button class="tab" data-screen="search">Recherche</button>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
