<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Blokaja</title>
  <link rel="icon" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-512.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <button id="btn-back" class="hdr-btn hidden" aria-label="Retour">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M13 4L7 10L13 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <h1 id="header-title">Blokaja</h1>
    </header>

    <!-- Home -->
    <section id="screen-home" class="screen active">
      <input type="text" id="search-home" class="search-input" placeholder="Chercher un mot...">

      <div id="global-progress"></div>

      <div class="section-label">Chapitres</div>
      <div id="chapters-grid"></div>

      <div class="section-label">Categories</div>
      <div id="categories-grid"></div>
    </section>

    <!-- List -->
    <section id="screen-list" class="screen">
      <div class="list-head">
        <div class="list-meta">
          <h2 id="list-title"></h2>
          <span id="list-stats" class="list-stats"></span>
        </div>
        <button id="btn-fc" class="btn-go">Reviser</button>
      </div>
      <div class="bar"><div id="list-bar" class="bar-fill"></div></div>
      <div id="items"></div>
    </section>

    <!-- Flashcard -->
    <section id="screen-fc" class="screen">
      <div class="fc-meta">
        <span id="fc-cat"></span>
        <span id="fc-page"></span>
      </div>
      <div id="fc-card" class="fc-card">
        <div id="fc-front" class="fc-face"></div>
        <div id="fc-back" class="fc-face hidden"></div>
      </div>
      <div id="fc-actions" class="fc-actions hidden">
        <button id="fc-nope" class="btn-nope">Pas su</button>
        <button id="fc-ok" class="btn-ok">Su</button>
      </div>
      <button id="fc-reveal" class="btn-reveal">Retourner</button>
    </section>

    <!-- Search -->
    <section id="screen-search" class="screen">
      <input type="text" id="search-full" class="search-input" placeholder="Chercher un mot...">
      <div id="search-results"></div>
    </section>

    <nav id="tabs">
      <button class="tab active" data-screen="home">Accueil</button>
      <button class="tab" data-screen="search">Recherche</button>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
